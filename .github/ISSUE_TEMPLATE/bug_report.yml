name: Bug Report
description: Report a problem with obsidian-docs-mcp
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `obsidian-docs-mcp index`
        2. Call the `SearchDocumentation` tool with query "..."
        3. ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. Ubuntu 24.04, Windows 11, macOS 15
    validations:
      required: true
  - type: input
    id: dotnet-version
    attributes:
      label: .NET version
      placeholder: dotnet --version
    validations:
      required: false
  - type: input
    id: tool-version
    attributes:
      label: obsidian-docs-mcp version
      placeholder: dotnet tool list -g
    validations:
      required: true
  - type: input
    id: ollama-version
    attributes:
      label: Ollama version (if relevant)
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: MCP servers log to stderr; paste any relevant output here.
      render: shell
    validations:
      required: false
