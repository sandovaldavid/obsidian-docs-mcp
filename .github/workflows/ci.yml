name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore ObsidianDocsMcp/ObsidianDocsMcp.csproj

      - name: Build
        run: dotnet build ObsidianDocsMcp/ObsidianDocsMcp.csproj --no-restore -c Release

      - name: Pack
        run: dotnet pack ObsidianDocsMcp/ObsidianDocsMcp.csproj --no-build -c Release -o ./artifacts

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
