name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Same anti-recursion rule as the docs.yml trigger below: release-please-action creates
      # the GitHub Release using the default GITHUB_TOKEN, so the `release: published` event it
      # fires does NOT trigger nuget-publish.yml automatically. Trigger it explicitly instead.
      - name: Trigger NuGet publish
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run nuget-publish.yml --repo ${{ github.repository }} --ref main -f tag=${{ steps.release.outputs.tag_name }}

  sync-changelog:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Regenerate docs/changelog.md from CHANGELOG.md
        run: |
          {
            echo '---'
            echo 'title: Changelog'
            echo 'nav_order: 7'
            echo '---'
            echo
            cat CHANGELOG.md
          } > docs/changelog.md

      # Direct pushes to main are blocked by branch rulesets (same reason
      # sync-develop routes through a PR instead of committing straight to
      # main) — open a PR here too. Its merge (a normal push by a human, not
      # the default GITHUB_TOKEN) triggers docs.yml on its own since that
      # workflow watches docs/** on main — no separate dispatch needed.
      - name: Open changelog sync PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- docs/changelog.md; then
            echo "No changelog changes to sync."
            exit 0
          fi

          branch="chore/sync-changelog-${{ github.run_id }}"
          git checkout -b "$branch"
          git add docs/changelog.md
          git commit -m "docs(changelog): sync changelog page"
          git push -u origin "$branch"

          gh pr create --repo ${{ github.repository }} --base main --head "$branch" \
            --title "docs(changelog): sync changelog page" \
            --body "Automated sync of docs/changelog.md from CHANGELOG.md after a release-please release. Merging this triggers the Pages deploy (docs.yml watches docs/** on main)."
